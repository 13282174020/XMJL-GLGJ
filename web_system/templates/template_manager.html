<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>模板管理系统</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:"Microsoft YaHei",Arial,sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}
        .container{max-width:1200px;margin:0 auto;background:white;border-radius:15px;box-shadow:0 20px 60px rgba(0,0,0,0.3);overflow:hidden}
        .header{background:linear-gradient(135deg,#1e3c72 0%,#2a5298 100%);color:white;padding:25px 30px;display:flex;justify-content:space-between;align-items:center}
        .header h1{font-size:24px}
        .content{padding:30px}
        .btn{padding:10px 20px;border:none;border-radius:6px;cursor:pointer;font-size:14px;transition:all 0.3s}
        .btn-primary{background:#667eea;color:white}
        .btn-primary:hover{background:#5568d3}
        .btn-secondary{background:#f0f0f0;color:#666}
        .btn-sm{padding:5px 10px;font-size:12px}
        .btn-danger{background:#e74c3c;color:white}
        .template-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px;margin-top:20px}
        .template-card{border:1px solid #e0e0e0;border-radius:10px;padding:20px;transition:all 0.3s}
        .template-card:hover{box-shadow:0 5px 20px rgba(0,0,0,0.1);transform:translateY(-2px)}
        .template-card h3{color:#1e3c72;margin-bottom:10px}
        .template-card .meta{font-size:12px;color:#999;margin-bottom:15px}
        .template-card .actions{display:flex;gap:10px}
        .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:1000;justify-content:center;align-items:center}
        .modal.show{display:flex}
        .modal-content{background:white;border-radius:15px;max-width:800px;width:90%;max-height:90vh;overflow-y:auto;padding:30px}
        .modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;padding-bottom:15px;border-bottom:2px solid #eee}
        .close-btn{background:none;border:none;font-size:24px;cursor:pointer;color:#999}
        .upload-area{border:2px dashed #667eea;border-radius:10px;padding:40px;text-align:center;cursor:pointer;transition:all 0.3s}
        .upload-area:hover{background:#f5f7ff;border-color:#5568d3}
        .analysis-result{margin-top:20px;padding:15px;background:#f9f9f9;border-radius:8px}
        .alert{padding:12px 20px;border-radius:6px;margin-bottom:15px}
        .alert-success{background:#d4edda;color:#155724}
        .alert-error{background:#f8d7da;color:#721c24}
        .step{flex:1;padding:10px;text-align:center;background:#f0f0f0;border-radius:6px;font-size:14px}
        .step.active{background:#667eea;color:white}
        .step.completed{background:#28a745;color:white}
        .step-indicator{display:flex;gap:10px;margin-bottom:20px}
        .form-group{margin-bottom:15px}
        .form-group label{display:block;margin-bottom:5px;font-weight:600}
        .form-group input,.form-group select{width:100%;padding:10px;border:1px solid #ddd;border-radius:6px}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📚 模板管理系统</h1>
            <button class="btn btn-primary" onclick="showUploadModal()">+ 上传新模板</button>
        </div>
        <div class="content">
            <div id="alertContainer"></div>
            <h2 style="margin-bottom:20px;color:#1e3c72;">模板库</h2>
            <div id="templateGrid" class="template-grid">
                <p style="color:#999;text-align:center;padding:40px;">加载中...</p>
            </div>
        </div>
    </div>
    
    <div id="uploadModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>上传新模板</h2>
                <button class="close-btn" onclick="closeUploadModal()">&times;</button>
            </div>
            <div class="step-indicator">
                <div class="step active" id="step1">1.上传</div>
                <div class="step" id="step2">2.分析</div>
                <div class="step" id="step3">3.预处理</div>
                <div class="step" id="step4">4.保存</div>
            </div>
            <div id="uploadStep">
                <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
                    <p style="font-size:48px;margin-bottom:10px;">📁</p>
                    <p>点击选择文件或拖拽文件到此处</p>
                    <p style="color:#999;font-size:12px;margin-top:10px;">支持 .docx 格式</p>
                </div>
                <input type="file" id="fileInput" accept=".docx" style="display:none" onchange="handleFileSelect(event)">
            </div>
            <div id="analysisStep" style="display:none">
                <div class="analysis-result">
                    <h4>📊 分析报告</h4>
                    <div id="analysisContent"></div>
                </div>
                <div style="margin-top:20px;display:flex;gap:10px;justify-content:flex-end">
                    <button class="btn btn-secondary" onclick="resetUpload()">重新上传</button>
                    <button class="btn btn-primary" onclick="preprocessTemplate()">下一步：预处理</button>
                </div>
            </div>
            <div id="preprocessStep" style="display:none">
                <div class="analysis-result">
                    <h4>⚙️ 预处理结果</h4>
                    <div id="preprocessContent"></div>
                </div>
                <div style="margin-top:20px;display:flex;gap:10px;justify-content:flex-end">
                    <button class="btn btn-secondary" onclick="showStep('analysisStep')">上一步</button>
                    <button class="btn btn-primary" onclick="showSaveStep()">下一步：保存</button>
                </div>
            </div>
            <div id="saveStep" style="display:none">
                <div class="form-group">
                    <label>模板名称</label>
                    <input type="text" id="templateName" placeholder="输入模板名称">
                </div>
                <div class="form-group">
                    <label>模板类型</label>
                    <select id="templateType">
                        <option value="custom">自定义</option>
                        <option value="future_community">未来社区</option>
                        <option value="smart_community">智慧社区</option>
                    </select>
                </div>
                <div style="margin-top:20px;display:flex;gap:10px;justify-content:flex-end">
                    <button class="btn btn-secondary" onclick="showStep('preprocessStep')">上一步</button>
                    <button class="btn btn-primary" onclick="saveTemplate()">💾 保存到模板库</button>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        const API_BASE='/api/v2/templates';
        let currentUpload={tempPath:null,rules:[],outputPath:null,analysis:null};
        
        async function loadTemplates(){
            try{
                const resp=await fetch(`${API_BASE}/list`);
                const data=await resp.json();
                if(data.success)renderTemplates(data.templates);
                else showAlert('加载失败：'+data.message,'error');
            }catch(e){showAlert('加载失败：'+e.message,'error')}
        }
        
        function renderTemplates(templates){
            const grid=document.getElementById('templateGrid');
            if(templates.length===0){
                grid.innerHTML='<p style="color:#999;text-align:center;padding:40px;grid-column:1/-1">模板库为空</p>';return;
            }
            grid.innerHTML=templates.map(t=>`
                <div class="template-card">
                    <h3>${escapeHtml(t.name)}</h3>
                    <div class="meta"><div>类型：${escapeHtml(t.type)}</div><div>创建：${escapeHtml(t.created_at)}</div></div>
                    <div class="actions">
                        <button class="btn btn-primary btn-sm" onclick="downloadTemplate('${t.id}')">下载</button>
                        <button class="btn btn-danger btn-sm" onclick="deleteTemplate('${t.id}')">删除</button>
                    </div>
                </div>
            `).join('');
        }
        
        function showUploadModal(){document.getElementById('uploadModal').classList.add('show');resetUpload()}
        function closeUploadModal(){document.getElementById('uploadModal').classList.remove('show');resetUpload()}
        function resetUpload(){currentUpload={tempPath:null,rules:[],outputPath:null,analysis:null};document.getElementById('fileInput').value='';showStep('uploadStep')}
        
        function showStep(stepId){
            ['uploadStep','analysisStep','preprocessStep','saveStep'].forEach(id=>{
                document.getElementById(id).style.display=id===stepId?'block':'none'
            });
            ['step1','step2','step3','step4'].forEach((id,i)=>{
                const s=document.getElementById(id);s.classList.remove('active','completed');
                if(id===stepId.replace('Step',''))s.classList.add('active')
            })
        }
        
        async function handleFileSelect(e){
            const file=e.target.files[0];if(!file)return;
            
            // 检查文件扩展名
            if(!file.name.toLowerCase().endsWith('.docx')){
                showAlert('请上传 .docx 格式的文件（Office 2007+）','error');
                return;
            }
            
            // 检查文件大小（至少 1KB）
            if(file.size < 1024){
                showAlert('文件太小，可能已损坏','error');
                return;
            }
            
            // 读取文件头检查是否为 ZIP 格式（docx 本质是 ZIP）
            const arrayBuffer = await file.slice(0, 4).arrayBuffer();
            const bytes = new Uint8Array(arrayBuffer);
            const header = Array.from(bytes).map(b => b.toString(16).padStart(2, '0')).join('');
            
            // ZIP 文件头应该是 504B0304
            if(header !== '504b0304'){
                showAlert('文件格式不正确：这不是有效的 .docx 文件（可能是旧版 .doc 格式）','error');
                return;
            }
            
            const formData=new FormData();formData.append('file',file);
            try{
                const resp=await fetch(`${API_BASE}/upload`,{method:'POST',body:formData});
                const data=await resp.json();
                if(data.success){
                    currentUpload.tempPath=data.temp_path;currentUpload.rules=data.rules;currentUpload.analysis=data.analysis;
                    renderAnalysis(data);showStep('analysisStep')
                }else showAlert('上传失败：'+data.message,'error')
            }catch(e){showAlert('上传失败：'+e.message,'error')}
        }
        
        function renderAnalysis(data){
            const a=data.analysis;
            const headingStyles = Object.entries(a.heading_styles || {});
            const potentialStyles = a.potential_heading_styles || [];
            
            let html = `
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:15px;margin-bottom:15px">
                    <div style="background:#f8f9fa;padding:15px;border-radius:8px">
                        <p style="margin:0;font-size:13px;color:#666">📄 文件</p>
                        <p style="margin:5px 0 0 0;font-weight:600">${escapeHtml(a.file_path.split('/').pop())}</p>
                    </div>
                    <div style="background:#f8f9fa;padding:15px;border-radius:8px">
                        <p style="margin:0;font-size:13px;color:#666">📊 段落数</p>
                        <p style="margin:5px 0 0 0;font-weight:600">${a.total_paragraphs}</p>
                    </div>
                    <div style="background:#f8f9fa;padding:15px;border-radius:8px">
                        <p style="margin:0;font-size:13px;color:#666">🎨 样式数</p>
                        <p style="margin:5px 0 0 0;font-weight:600">${Object.keys(a.styles_usage).length}</p>
                    </div>
                    <div style="background:#f8f9fa;padding:15px;border-radius:8px">
                        <p style="margin:0;font-size:13px;color:#666">📝 规则数</p>
                        <p style="margin:5px 0 0 0;font-weight:600">${data.rules.length}</p>
                    </div>
                </div>
                
                <h5 style="margin-top:15px;margin-bottom:10px">📋 样式映射规则：</h5>
                <div style="max-height:300px;overflow-y:auto;border:1px solid #e0e0e0;border-radius:8px">
                    ${data.rules.length > 0 ? `
                        <table style="width:100%;border-collapse:collapse;font-size:13px">
                            <thead style="position:sticky;top:0;background:#1e3c72;color:white">
                                <tr>
                                    <th style="padding:10px;text-align:left">源样式</th>
                                    <th style="padding:10px">编号模式</th>
                                    <th style="padding:10px">目标样式</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${data.rules.map((r,i) => `
                                    <tr style="${i%2===0?'background:#fff':'background:#f8f9fa'}">
                                        <td style="padding:8px;border-bottom:1px solid #e0e0e0">${escapeHtml(r.source_style)}</td>
                                        <td style="padding:8px;border-bottom:1px solid #e0e0e0;text-align:center;font-family:monospace;font-size:12px">${r.pattern ? escapeHtml(r.pattern) : '-'}</td>
                                        <td style="padding:8px;border-bottom:1px solid #e0e0e0;text-align:center;color:#1e3c72;font-weight:600">${escapeHtml(r.target_style)}</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    ` : '<p style="padding:20px;text-align:center;color:#999">暂无映射规则</p>'}
                </div>
                
                ${potentialStyles.length > 0 ? `
                    <h5 style="margin-top:15px;margin-bottom:10px">🔍 潜在标题样式：</h5>
                    <div style="display:flex;flex-wrap:wrap;gap:8px">
                        ${potentialStyles.map(s => `<span style="background:#e3f2fd;color:#1e3c72;padding:4px 10px;border-radius:4px;font-size:12px">${escapeHtml(s)}</span>`).join('')}
                    </div>
                ` : ''}
            `;
            document.getElementById('analysisContent').innerHTML = html;
        }
        
        async function preprocessTemplate(){
            try{
                const resp=await fetch(`${API_BASE}/preprocess`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({temp_path:currentUpload.tempPath,rules:currentUpload.rules})});
                const data=await resp.json();
                if(data.success){
                    currentUpload.outputPath=data.output_path;
                    document.getElementById('preprocessContent').innerHTML=`<p>${escapeHtml(data.message)}</p>`;
                    showStep('preprocessStep')
                }else showAlert('预处理失败：'+data.message,'error')
            }catch(e){showAlert('预处理失败：'+e.message,'error')}
        }
        
        function showSaveStep(){document.getElementById('templateName').value='新模板_'+Date.now();showStep('saveStep')}
        
        async function saveTemplate(){
            const name=document.getElementById('templateName').value.trim();const type=document.getElementById('templateType').value;
            if(!name){showAlert('请输入模板名称','error');return}
            try{
                const resp=await fetch(`${API_BASE}/save`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,type,output_path:currentUpload.outputPath,chapter_structure:{},style_config:{}})});
                const data=await resp.json();
                if(data.success){showAlert('模板已保存','success');closeUploadModal();loadTemplates()}
                else showAlert('保存失败：'+data.message,'error')
            }catch(e){showAlert('保存失败：'+e.message,'error')}
        }
        
        function downloadTemplate(id){window.open(`${API_BASE}/${id}/download`,'_blank')}
        
        async function deleteTemplate(id){
            if(!confirm('确定删除？'))return;
            try{
                const resp=await fetch(`${API_BASE}/${id}`,{method:'DELETE'});
                const data=await resp.json();
                if(data.success){showAlert('已删除','success');loadTemplates()}
                else showAlert('删除失败：'+data.message,'error')
            }catch(e){showAlert('删除失败：'+e.message,'error')}
        }
        
        function showAlert(msg,type){
            document.getElementById('alertContainer').innerHTML=`<div class="alert alert-${type}">${escapeHtml(msg)}</div>`;
            setTimeout(()=>document.getElementById('alertContainer').innerHTML='',5000)
        }
        
        function escapeHtml(t){const d=document.createElement('div');d.textContent=t;return d.innerHTML}
        
        const uploadArea=document.getElementById('uploadArea');
        uploadArea.addEventListener('dragover',e=>{e.preventDefault();uploadArea.classList.add('dragover')});
        uploadArea.addEventListener('dragleave',()=>uploadArea.classList.remove('dragover'));
        uploadArea.addEventListener('drop',e=>{e.preventDefault();uploadArea.classList.remove('dragover');handleFileSelect({target:{files:e.dataTransfer.files}})});
        
        loadTemplates()
    </script>
</body>
</html>
