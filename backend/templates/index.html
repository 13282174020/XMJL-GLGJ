<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>软件建设方案 AI 生成系统 V2.0</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Microsoft YaHei", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 25px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 { font-size: 24px; }
        .header .badge {
            background: #f39c12;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            margin-left: 10px;
        }
        .content { padding: 30px; }
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }
        .form-group textarea { min-height: 100px; resize: vertical; }
        .file-upload {
            border: 2px dashed #ddd;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
        }
        .file-upload:hover { border-color: #667eea; background: #f0f0ff; }
        .file-upload.has-file { border-color: #27ae60; background: #e8f8f0; }
        .file-upload input[type="file"] { display: none; }
        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4); }
        .btn-primary:disabled { background: #ccc; cursor: not-allowed; transform: none; }
        .loading {
            display: none;
            text-align: center;
            padding: 30px;
            background: #f8f9fa;
            border-radius: 10px;
            margin-top: 20px;
        }
        .loading.show { display: block; }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
            margin: 15px 0;
        }
        .progress-bar .progress {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            width: 0%;
            transition: width 0.3s;
        }
        .result {
            margin-top: 20px;
            padding: 20px;
            border-radius: 10px;
            display: none;
        }
        .result.success { background: #e8f8f0; border: 1px solid #27ae60; }
        .result.error { background: #fef0f0; border: 1px solid #e74c3c; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📄 软件建设方案 AI 生成系统 <span class="badge">V2.0</span></h1>
            <a href="/task-center" style="color: white; text-decoration: none; background: rgba(255,255,255,0.2); padding: 8px 15px; border-radius: 6px;">📊 任务管理中心</a>
        </div>

        <div class="content">
            <form id="generateForm">
                <div class="form-group">
                    <label>📄 需求文档 <span style="color: #e74c3c;">*</span></label>
                    <div class="file-upload" id="requirementUpload" onclick="document.getElementById('requirementFile').click()">
                        <input type="file" id="requirementFile" accept=".docx,.doc,.txt">
                        <div style="font-size: 32px;">📎</div>
                        <div>点击上传需求调研文档</div>
                        <div class="filename" id="requirementFilename" style="color: #27ae60; margin-top: 8px;"></div>
                    </div>
                </div>

                <div class="form-group">
                    <label>🤖 AI 模型</label>
                    <select id="modelSelect">
                        <option value="qwen-max">通义千问-Max（推荐）</option>
                        <option value="qwen-plus">通义千问-Plus</option>
                        <option value="qwen-turbo">通义千问-Turbo</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>✏️ 补充要求</label>
                    <textarea id="userInstruction" placeholder="请输入项目名称、投资规模、重点场景等补充说明..."></textarea>
                </div>

                <button type="submit" class="btn btn-primary btn-block" id="submitBtn">🚀 开始生成方案</button>
            </form>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <div class="progress-bar">
                    <div class="progress" id="progressBar"></div>
                </div>
                <div class="progress-text" id="progressText">正在提交任务...</div>
            </div>

            <div class="result" id="result"></div>
        </div>
    </div>

    <script>
        let uploadedDocId = null;

        // 文件上传处理
        document.getElementById('requirementFile').addEventListener('change', async function(e) {
            const file = this.files[0];
            if (!file) return;

            document.getElementById('requirementFilename').textContent = '✓ ' + file.name;
            document.getElementById('requirementUpload').classList.add('has-file');

            // 上传文件
            const formData = new FormData();
            formData.append('file', file);
            formData.append('file_type', 'requirement');

            try {
                const response = await fetch('/api/v1/documents/upload', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();
                
                if (data.success) {
                    uploadedDocId = data.document.id;
                    console.log('文件上传成功:', uploadedDocId);
                } else {
                    alert('上传失败：' + data.message);
                }
            } catch (error) {
                alert('上传失败：' + error.message);
            }
        });

        // 表单提交
        document.getElementById('generateForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            if (!uploadedDocId) {
                alert('请先上传需求文档');
                return;
            }

            const submitBtn = document.getElementById('submitBtn');
            const loading = document.getElementById('loading');
            const result = document.getElementById('result');
            const progressBar = document.getElementById('progressBar');
            const progressText = document.getElementById('progressText');

            submitBtn.disabled = true;
            loading.classList.add('show');
            result.style.display = 'none';

            try {
                // 创建任务
                const response = await fetch('/api/v1/tasks', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        requirement_doc_id: uploadedDocId,
                        user_instruction: document.getElementById('userInstruction').value,
                        llm_model: document.getElementById('modelSelect').value
                    })
                });

                const data = await response.json();

                if (data.success) {
                    progressText.textContent = '任务已创建，跳转到任务管理中心...';
                    progressBar.style.width = '100%';
                    
                    setTimeout(() => {
                        window.location.href = '/task-center';
                    }, 1500);
                } else {
                    throw new Error(data.message);
                }
            } catch (error) {
                loading.classList.remove('show');
                submitBtn.disabled = false;
                result.className = 'result error';
                result.textContent = '生成失败：' + error.message;
                result.style.display = 'block';
            }
        });
    </script>
</body>
</html>
